# ORTHANC-AUTHELIA STANDALONE - Complete medical imaging solution
# Includes PostgreSQL 15 database, Redis, Orthanc, OHIF, Authelia, and Nginx
# Self-contained deployment with all services in internal network

services:
  # =============================================================================
  # DATABASE SERVICES
  # =============================================================================
  
  postgres:
    image: postgres:15
    container_name: orthanc-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orthanc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.0-alpine
    container_name: orthanc-redis
    restart: unless-stopped
    networks:
      - orthanc-network

  # =============================================================================
  # AUTHENTICATION SERVICES
  # =============================================================================
  
  auth-service:
    image: registry.yokoinc.ovh/orthanc-auth-service:1.0.4
    container_name: orthanc-auth-service
    restart: unless-stopped
    environment:
      # Essential Configuration (from .env)
      - LANGUAGE=${LANGUAGE}
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - REDIS_HOST=redis
      # Optional overrides (uncomment in .env if needed)
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEFAULT_TOKEN_MAX_USES=${DEFAULT_TOKEN_MAX_USES:-50}
      - DEFAULT_TOKEN_VALIDITY_SECONDS=${DEFAULT_TOKEN_VALIDITY_SECONDS:-604800}
      - CACHE_VALIDITY_USER_SESSION=${CACHE_VALIDITY_USER_SESSION:-300}
      - CACHE_VALIDITY_SHARE_TOKEN=${CACHE_VALIDITY_SHARE_TOKEN:-60}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-90}
      - JS_REFRESH_INTERVAL=${JS_REFRESH_INTERVAL:-30000}
      - JS_DEBUG_MODE=${JS_DEBUG_MODE:-false}
    depends_on:
      - redis
    networks:
      - orthanc-network

  authelia:
    image: authelia/authelia:4.39.5 
    container_name: orthanc-authelia
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ./services/authelia/config:/config
    networks:
      - orthanc-network
    environment:
      - TZ=${TZ}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_DOMAIN=${AUTHELIA_DOMAIN:-pacs.example.com}
      - AUTHELIA_LOG_LEVEL=${AUTHELIA_LOG_LEVEL:-info}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0

  # =============================================================================
  # PACS CORE SERVICES
  # =============================================================================
  
  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: orthanc-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - ./services/orthanc/config/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_data:/var/lib/orthanc/db
    networks:
      - orthanc-network
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  # =============================================================================
  # MEDICAL IMAGING VIEWERS
  # =============================================================================
  
  ohif:
    image: registry.yokoinc.ovh/orthanc-ohif:3.10.2
    container_name: orthanc-ohif
    restart: unless-stopped
    volumes:
      - ./services/ohif/config/app-config.js:/usr/share/nginx/html/ohif/app-config.js:ro
    depends_on:
      - orthanc
    networks:
      - orthanc-network

  # =============================================================================
  # REVERSE PROXY & LOAD BALANCER
  # =============================================================================
  
  nginx:
    image: nginx:1.28.0-alpine
    container_name: orthanc-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_EXTERNAL_PORT:-30080}:80"
      - "30443:443"
    volumes:
      - ./services/nginx/${NGINX_CONFIG:-nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./services/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./services/nginx/logo:/usr/share/nginx/logo:ro
      - ./ssl/pacs.crt:/etc/nginx/ssl/cert.pem:ro
      - ./ssl/pacs.key:/etc/nginx/ssl/key.pem:ro
    environment:
      - SSL_ENABLED=${SSL_ENABLED:-false}
    depends_on:
      - authelia
      - orthanc
      - ohif
      - auth-service
    networks:
      - orthanc-network

# =============================================================================
# PERSISTENT STORAGE
# =============================================================================

volumes:
  postgres_data:
    name: orthanc-postgres-data
    driver: local
  orthanc_data:
    name: orthanc-dicom-data
    driver: local

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================

networks:
  orthanc-network:
    name: orthanc-network
    driver: bridge