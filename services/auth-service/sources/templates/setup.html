<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration initiale — Orthanc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="/auth/static/oe2-shared.css?v={asset_version}" rel="stylesheet">
    <style>
        .setup-wrap { max-width: 520px; margin: 60px auto; padding: 32px 28px;
                      background: var(--oe2-card-bg); border: 1px solid var(--oe2-border);
                      border-radius: 4px; color: var(--oe2-nav-color); }
        .setup-wrap h1 { font-size: 20px; font-weight: 400; margin: 0 0 8px; }
        .setup-wrap .subtitle { color: var(--oe2-muted); font-size: 13px; margin-bottom: 24px; }
        .setup-wrap label { display: block; font-size: 12px; color: var(--oe2-muted);
                            margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .setup-wrap input { width: 100%; background: var(--oe2-nav-sub-bg);
                            border: 1px solid var(--oe2-border-subtle);
                            color: var(--oe2-nav-color); padding: 8px 10px;
                            border-radius: 3px; font-size: 13px; }
        .setup-wrap input:focus { border-color: var(--oe2-accent); outline: none; }
        .setup-wrap .hint { font-size: 11px; color: var(--oe2-muted); margin-top: 4px; }
        .setup-wrap .actions { margin-top: 24px; display: flex; justify-content: flex-end; }
        .setup-wrap .msg { margin-top: 16px; padding: 10px 12px; border-radius: 3px;
                           font-size: 12px; display: none; }
        .setup-wrap .msg--err { background: rgba(220,53,69,0.15);
                                border-left: 3px solid var(--oe2-danger); color: #ffb0b0; }
        .setup-wrap .msg--ok { background: rgba(40,167,69,0.15);
                               border-left: 3px solid var(--oe2-success); color: #b6f0c0; }
    </style>
</head>
<body>
    <div class="setup-wrap">
        <h1><i class="fa-solid fa-shield-halved" aria-hidden="true"></i> Configuration initiale</h1>
        <p class="subtitle">
            Premier démarrage — création du compte administrateur.
            Ce compte pourra ensuite gérer les autres users depuis le hub Admin.
        </p>

        <form id="setup-form">
            <label for="username">Login</label>
            <input type="text" id="username" name="username" required
                   pattern="[a-zA-Z0-9._-]{3,32}" placeholder="cuffel.gregory">
            <div class="hint">3-32 caractères, alphanumériques + . _ -</div>

            <label for="displayname">Nom affiché</label>
            <input type="text" id="displayname" name="displayname" required
                   maxlength="100" placeholder="Grégory Cuffel">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required
                   placeholder="cuffel.gregory@gmail.com">

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required
                   minlength="12" placeholder="min 12 caractères">
            <div class="hint">Hashé argon2id avant écriture dans users_database.yml</div>

            <label for="password2">Confirmation</label>
            <input type="password" id="password2" name="password2" required minlength="12">

            <div id="msg" class="msg"></div>

            <div class="actions">
                <button type="submit" class="oe2-btn oe2-btn--primary" id="submit-btn">
                    Créer l'admin et finaliser
                </button>
            </div>
        </form>
    </div>

<script>
const form = document.getElementById('setup-form');
const msg = document.getElementById('msg');
const btn = document.getElementById('submit-btn');

function showMsg(text, ok) {
    msg.className = 'msg msg--' + (ok ? 'ok' : 'err');
    msg.textContent = text;
    msg.style.display = 'block';
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (form.password.value !== form.password2.value) {
        showMsg('Les 2 mots de passe ne correspondent pas.', false);
        return;
    }
    btn.disabled = true;
    btn.textContent = 'Création en cours…';

    try {
        // 1. Créer l'admin
        let r = await fetch('/auth/setup/create-admin', {
            method: 'POST',
            headers: {'content-type': 'application/json'},
            body: JSON.stringify({
                username: form.username.value,
                displayname: form.displayname.value,
                email: form.email.value,
                password: form.password.value,
                groups: ['admins'],
            }),
        });
        if (!r.ok) {
            const err = await r.text();
            throw new Error('create-admin: ' + err);
        }

        // 2. Finaliser
        r = await fetch('/auth/setup/finalize', {method: 'POST'});
        if (!r.ok) {
            const err = await r.text();
            throw new Error('finalize: ' + err);
        }

        showMsg('Admin créé et setup finalisé. Redirection vers la connexion…', true);
        setTimeout(() => { window.location.href = '/auth/admin'; }, 1500);
    } catch (e) {
        showMsg(e.message, false);
        btn.disabled = false;
        btn.textContent = "Créer l'admin et finaliser";
    }
});
</script>
</body>
</html>
