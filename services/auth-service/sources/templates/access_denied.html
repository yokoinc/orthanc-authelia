<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{access_denied_title}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="/auth/static/oe2-shared.css" rel="stylesheet">
</head>
<body>
    <div class="oe2-centered">
        <img src="/orthanc-logo.png" alt="Orthanc" class="oe2-centered__logo" onerror="this.style.display='none'">
        <div class="oe2-centered__card">
            <div class="oe2-centered__icon oe2-centered__icon--danger">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="oe2-centered__title">{access_denied_title}</h1>
            <p class="oe2-centered__message">{message}</p>
            {back_link}
        </div>
    </div>
</body>
</html>
