<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{access_denied_title}</title>
    <link href="{font_awesome_cdn}" rel="stylesheet">
    <link href="/auth/static/oe2-shared.css?v={asset_version}" rel="stylesheet">
</head>
<body>
    <div class="oe2-centered">
        <img src="/auth/static/orthanc-logo-official.png" alt="Orthanc" class="oe2-centered__logo" onerror="this.style.display='none'">
        <div class="oe2-centered__card">
            <div class="oe2-centered__icon oe2-centered__icon--danger">
                <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
            </div>
            <h1 class="oe2-centered__title">{access_denied_title}</h1>
            <p class="oe2-centered__message">{message}</p>
            {back_link}
        </div>
    </div>
</body>
</html>
