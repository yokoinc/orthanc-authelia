<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{title}</title>
    <link href="{font_awesome_cdn}" rel="stylesheet">
    <link href="/auth/static/oe2-shared.css" rel="stylesheet">
</head>
<body>
    <div class="oe2-centered">
        <img src="/orthanc-logo.png" alt="Orthanc" class="oe2-centered__logo" onerror="this.style.display='none'">
        <div class="oe2-centered__card">
            <div class="oe2-centered__icon oe2-centered__icon--danger">
                <i class="{icon_class}"></i>
            </div>
            <h1 class="oe2-centered__title">{title}</h1>
            <p class="oe2-centered__message">{message}</p>
            {extra_content}
        </div>
    </div>
</body>
</html>
