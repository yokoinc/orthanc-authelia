<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{redirect_title}</title>
    <meta http-equiv="refresh" content="0; url={ohif_url}">
    <link href="{font_awesome_cdn}" rel="stylesheet">
    <link href="/auth/static/oe2-shared.css?v={asset_version}" rel="stylesheet">
</head>
<body>
    <div class="oe2-centered">
        <img src="/auth/static/orthanc-logo-official.png" alt="Orthanc" class="oe2-centered__logo" onerror="this.style.display='none'">
        <div class="oe2-centered__card">
            <div class="oe2-centered__icon">
                <i class="fas fa-spinner fa-pulse" aria-hidden="true"></i>
            </div>
            <h1 class="oe2-centered__title">{redirecting}</h1>
            <p class="oe2-centered__message">{redirect_message}</p>
            <a href="{ohif_url}" class="oe2-centered__link">
                <i class="fas fa-arrow-right" aria-hidden="true"></i>
                {redirect_click_here}
            </a>
        </div>
    </div>
</body>
</html>
