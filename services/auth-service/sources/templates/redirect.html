<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{redirect_title}</title>
    <meta http-equiv="refresh" content="0; url={ohif_url}">
    <script>
        (function() {{
            try {{
                var t = localStorage.getItem('oe2-theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            }} catch (e) {{
                document.documentElement.setAttribute('data-theme', 'dark');
            }}
        }})();
    </script>
    <link href="{font_awesome_cdn}" rel="stylesheet">
    <link href="/auth/static/oe2-shared.css" rel="stylesheet">
</head>
<body>
    <div class="oe2-centered">
        <img src="/orthanc-logo.png" alt="Orthanc" class="oe2-centered__logo" onerror="this.style.display='none'">
        <div class="oe2-centered__card">
            <div class="oe2-centered__icon">
                <i class="fas fa-spinner fa-pulse"></i>
            </div>
            <h1 class="oe2-centered__title">{redirecting}</h1>
            <p class="oe2-centered__message">{redirect_message}</p>
            <a href="{ohif_url}" class="oe2-centered__link">
                <i class="fas fa-arrow-right"></i>
                {redirect_click_here}
            </a>
        </div>
    </div>
</body>
</html>
