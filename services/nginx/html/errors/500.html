<!DOCTYPE html>
<html>
<head>
    <title>Erreur serveur - ORTHANC-AUTHELIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: Avenir, Helvetica, Arial, sans-serif; 
            background: #1e242a; 
            color: #e0e0e0; 
            text-align: center; 
            padding: 50px; 
            margin: 0;
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
        }
        h1 { 
            color: #6ea0c8; 
            margin-bottom: 20px; 
            font-size: 2.5em;
        }
        p { 
            color: #b0b0b0; 
            margin-bottom: 30px;
            font-size: 1.2em;
        }
        a { 
            color: #6ea0c8; 
            text-decoration: none; 
            padding: 10px 20px;
            border: 2px solid #6ea0c8;
            border-radius: 5px;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s ease;
        }
        a:hover { 
            background: #6ea0c8;
            color: #1e242a;
        }
        .icon { 
            font-size: 1.2em; 
            margin-right: 8px; 
        }
        .error-code {
            font-size: 6em;
            color: #f44336;
            margin-bottom: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">500</div>
        <h1><i class="fas fa-server icon"></i>Erreur serveur</h1>
        <p>Une erreur interne du serveur s'est produite.</p>
        <p>Veuillez réessayer dans quelques instants ou contactez l'administrateur.</p>
        <a href="javascript:history.back()"><i class="fas fa-arrow-left icon"></i>Retour</a>
        <a href="/"><i class="fas fa-home icon"></i>Accueil</a>
    </div>
</body>
</html>
