<!DOCTYPE html>
<html>
<head>
    <title>Accès non autorisé - ORTHANC-AUTHELIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: Avenir, Helvetica, Arial, sans-serif; 
            background: #2c5aa0; 
            color: #ffffff; 
            text-align: center; 
            padding: 50px; 
            margin: 0;
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
        }
        h1 { 
            color: #ffffff; 
            margin-bottom: 20px; 
            font-size: 2.5em;
        }
        p { 
            color: #b0b0b0; 
            margin-bottom: 30px;
            font-size: 1.2em;
        }
        a { 
            color: #ffffff; 
            text-decoration: none; 
            padding: 10px 20px;
            border: 2px solid #ffffff;
            border-radius: 5px;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s ease;
        }
        a:hover { 
            background: #ffffff;
            color: #2c5aa0;
        }
        .icon { 
            font-size: 1.2em; 
            margin-right: 8px; 
        }
        .error-code {
            font-size: 6em;
            color: #d32f2f;
            margin-bottom: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">401</div>
        <h1><i class="fas fa-lock icon"></i>Accès non autorisé</h1>
        <p>Vous devez être connecté pour accéder à cette ressource.</p>
        <p>Veuillez vous authentifier pour continuer.</p>
        <a href="/auth/"><i class="fas fa-sign-in-alt icon"></i>Se connecter</a>
        <a href="/"><i class="fas fa-home icon"></i>Accueil</a>
    </div>
</body>
</html>
