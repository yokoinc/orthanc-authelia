# =============================================================================
# NGINX SSL CONFIGURATION FOR ORTHANC-AUTHELIA
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 2g;

    # SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript 
               application/xml+rss application/rss+xml 
               application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

    # Include additional configurations
    include /etc/nginx/conf.d/*.conf;
    
    # =============================================================================
    # UPSTREAM SERVERS
    # =============================================================================
    upstream orthanc {
        server orthanc:8042;
    }

    upstream authelia {
        server authelia:9091;
    }

    upstream auth_service {
        server auth-service:8000;
    }

    upstream ohif {
        server ohif:8080;
    }

    # =============================================================================
    # TOKEN MAPPING
    # =============================================================================
    map $groups $auth_token {
        ~admin    "admin-token";
        ~doctor   "doctor-token";
        ~external "external-token";
        default   "";
    }

    # =============================================================================
    # HTTP TO HTTPS REDIRECT SERVER
    # =============================================================================
    server {
        listen 80;
        server_name _;
        
        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================================================
    # MAIN HTTPS SERVER
    # =============================================================================
    server {
        listen 443 ssl;
        server_name _;

        # SSL
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Buffer configuration
        large_client_header_buffers 8 16k;
        client_body_buffer_size 128k;
        client_header_buffer_size 4k;
        proxy_buffers 16 64k;
        proxy_buffer_size 128k;
        proxy_busy_buffers_size 256k;
        
        # Security headers (centralized configuration)
        include /etc/nginx/conf.d/security_headers.conf;
        etag off;

        # Root redirection - always redirect to UI, let UI handle authentication
        location = / {
            return 302 /ui/app/;
        }

        # Static assets (no authentication required)
        
        # Authelia static assets
        location ~ ^/static/?(.*)$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://authelia/static/$1;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/remove_csp.conf;
            
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        
        # Orthanc Explorer 2 favicon for app path requests
        location ~ ^/app/.*favicon\.ico$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            rewrite ^/app/.*favicon\.ico$ /ui/app/favicon.ico break;
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # OHIF assets from app path
        location /app/ {
            proxy_pass http://ohif/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/cors_ohif.conf;
            proxy_intercept_errors on;
        }
        
        # Authelia locales
        location = /locales {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://authelia/locales;
            include /etc/nginx/conf.d/proxy_headers.conf;
            expires 1h;
            add_header Cache-Control "public";
        }
        
        # Authelia locale files
        location ~ ^/locales/[^/]+/[^/]+\.json$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://authelia$request_uri;
            include /etc/nginx/conf.d/proxy_headers.conf;
            expires 1h;
            add_header Cache-Control "public";
        }

        # General static assets
        location ~* \.(js|css|png|jpe?g|gif|svg|ico|webp|json|gz|wasm|woff|woff2|ttf|eot|map)$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Authenticated application routes
        
        # Shared studies access (exact match for highest priority)  
        location = /share/ {
            auth_request off;               # Explicitly disable authentication
            proxy_pass http://auth_service/share/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/security_headers.conf;
        }
        
        # API calls from share interface
        location /share/api/ {
            proxy_pass http://orthanc/api/;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }
        
        # DICOM resources from share interface
        location ~ ^/share/(studies|series|instances|patients|tools|system|statistics|modalities|peers|plugins|jobs|changes|exports|preview)(?:/|$) {
            rewrite ^/share/(.*)$ /$1 break;
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/cors_headers.conf;
        }
        
        # Orthanc web interface
        location /ui/ {
            include /etc/nginx/conf.d/auth_request.conf;

            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;

            # Inject "Partages" button in OE2 sidebar
            sub_filter '</head>' '
            <script>
            (function(){
                function injectSharesButton(){
                    var menu=document.getElementById("menu-content");
                    if(!menu||document.getElementById("shares-injected"))return;
                    var upload=document.getElementById("upload-handler");
                    if(!upload)return;
                    var refItem=upload.previousElementSibling;
                    /* Clone the exact structure of Importer: icon + text directly in li, no <a> wrapper */
                    var li=document.createElement("li");
                    li.id="shares-injected";
                    li.className=refItem.className;
                    /* Copy the data-v attribute if present */
                    for(var i=0;i<refItem.attributes.length;i++){var a=refItem.attributes[i];if(a.name.startsWith("data-v-"))li.setAttribute(a.name,a.value);}
                    li.innerHTML="<i class=\\"fa fa-share-alt fa-lg menu-icon\\" style=\\"width:20px;min-width:20px;margin-right:10px;text-align:center\\"></i>Partages <span class=\\"ms-auto\\"></span>";
                    li.style.cursor="pointer";
                    li.addEventListener("click",function(){window.location.href="/auth/tokens/manage";});
                    upload.parentNode.insertBefore(li,upload.nextSibling);
                }
                var obs=new MutationObserver(function(){injectSharesButton();});
                obs.observe(document.documentElement,{childList:true,subtree:true});
                document.addEventListener("DOMContentLoaded",function(){setTimeout(injectSharesButton,500);});
            })();
            </script>
            </head>';
            sub_filter_once on;
        }
        
        # Stone WebViewer
        location /stone-webviewer/ {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }
        
        # VolView WebViewer
        location /volview/ {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }
        
        # OHIF static assets (all files except viewer pages)
        location ~ ^/ohif/(.+\.(js|css|png|jpe?g|gif|svg|ico|webp|json|gz|wasm|woff|woff2|ttf|eot|map|txt))$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://ohif;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/cors_ohif.conf;
            proxy_intercept_errors on;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # OHIF viewer assets directory
        location ^~ /ohif/assets/ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://ohif;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/cors_ohif.conf;
            proxy_intercept_errors on;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # OHIF Viewer
        location /ohif/ {
            # Allow static assets without authentication
            location ~ ^/ohif/.*\.(js|css|png|jpe?g|gif|svg|ico|webp|json|gz|wasm|woff|woff2|ttf|eot|map|txt)$ {
                satisfy any;
                allow all;
                
                proxy_pass http://ohif;
                include /etc/nginx/conf.d/proxy_headers.conf;
                include /etc/nginx/conf.d/cors_ohif.conf;
                proxy_intercept_errors on;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            # Require authentication for viewer pages
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://ohif;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
            include /etc/nginx/conf.d/cors_ohif.conf;
            proxy_intercept_errors on;
        }

        # DICOM API endpoints (authenticated)
        
        # WADO (Web Access to DICOM Objects)
        location /wado {
            include /etc/nginx/conf.d/auth_request.conf;
            include /etc/nginx/conf.d/extract_token.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # DICOM-Web API
        location /dicom-web {
            include /etc/nginx/conf.d/auth_request.conf;
            include /etc/nginx/conf.d/extract_token.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }
        
        # =====================================================================
        # Programmatic upload endpoint (bypasses Authelia SSO)
        # =====================================================================
        # Dedicated path for automated scripts to POST DICOM files.
        # Auth = HTTP Basic (htpasswd generated by entrypoint from
        # UPLOAD_USER / UPLOAD_PASSWORD env vars). If those env vars are unset,
        # /etc/nginx/htpasswd is absent and all requests here will 500
        # (intentional fail-closed behavior).
        #
        # Client usage:
        #   curl -u $UPLOAD_USER:$UPLOAD_PASSWORD --data-binary @file.dcm \
        #        -H "Content-Type: application/dicom" \
        #        https://${DOMAIN}/api-upload/instances
        # Accepts a single DICOM file OR a ZIP archive of multiple DICOMs.
        # =====================================================================
        location ~ ^/api-upload/(instances)(?:/|$) {
            # DEBUG: NO auth at all. Just proxy_pass straight to Orthanc.
            # If this still returns 403, the 403 is generated DOWNSTREAM of
            # auth (rewrite/proxy_pass itself or an inherited http-level
            # directive that survives even auth_request off).
            auth_request off;
            auth_basic off;

            client_max_body_size 4g;

            rewrite ^/api-upload/(.*)$ /$1 break;
            proxy_pass http://orthanc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # No user token is injected here on purpose: the request reaches
            # Orthanc fully ANONYMOUS. With Authorization plugin v0.10.0+, the
            # plugin then asks the auth-service for the anonymous user profile,
            # which is configured to grant ONLY 'upload' (defense in depth:
            # POST /instances works, but no read / list / delete / share, even
            # if the htpasswd or CF Access service token leaks).
            # See services/auth-service/sources/auth_service.py:get_user_profile.
        }

        # Orthanc REST API
        location ~ ^/(instances|patients|series|studies|tools|system|statistics|modalities|peers|plugins|jobs|changes|exports|preview|shares|shared|publish)(?:/|$) {
            include /etc/nginx/conf.d/auth_request.conf;

            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
            include /etc/nginx/conf.d/cors_headers.conf;
        }

        # Authelia authentication endpoints
        
        # Token management interface
        location /auth/tokens/manage {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://auth_service/tokens/manage;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # Token statistics endpoint
        location /auth/tokens/stats {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://auth_service/tokens/stats;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # Expired tokens endpoint
        location /auth/tokens/expired {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://auth_service/tokens/expired;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # Authorization plugin token endpoints
        location ^~ /auth/tokens {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://auth_service/tokens;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # Auth service static files
        location ^~ /auth/static/ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://auth_service/static/;
        }

        # Redirect /auth to /auth/
        location = /auth {
            return 302 /auth/;
        }

        # Authelia authentication interface
        location /auth/ {
            limit_req zone=auth burst=15 nodelay;

            proxy_pass http://authelia/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/remove_csp.conf;
            include /etc/nginx/conf.d/security_headers_authelia.conf;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host ${DOMAIN};
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Inject CSS to hide password reset link
            sub_filter '</head>' '<style>a[href="/reset-password/step1"]{display:none!important}</style></head>';
            sub_filter_once on;
        }
        
        # Authelia API endpoints
        location /api/ {
            limit_req zone=auth burst=10 nodelay;
            
            proxy_pass http://authelia/api/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            proxy_set_header Cookie $http_cookie;
        }

        # Internal authentication verification endpoint
        location /authelia/ {
            internal;
            proxy_pass http://authelia/api/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URL https://${DOMAIN}$request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header Cookie $http_cookie;
        }

        # Additional services
        
        # Authelia manifest.json
        location = /manifest.json {
            proxy_pass http://authelia/manifest.json;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }

        # Authelia authenticated endpoint
        location /authenticated {
            proxy_pass http://authelia/authenticated;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }

        # Root favicon
        location = /favicon.ico {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            rewrite ^/favicon\.ico$ /ui/app/favicon.ico break;
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Common web assets
        location ~ ^/(manifest\.json)$ {
            proxy_pass http://authelia$request_uri;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }

        # =============================================================================
        # ERROR HANDLING
        # =============================================================================

        # Redirect to Authelia login page when not authenticated
        location @authelia_redirect {
            return 302 https://${DOMAIN}/auth/?rd=$scheme://$http_host$request_uri;
        }

        # Handle 401 Unauthorized errors
        location @error401 {
            if ($http_accept ~ "application/json") {
                add_header Content-Type "application/json" always;
                return 401 '{"error": "Authentication required", "message": "Please login to access this resource"}';
            }
            root /usr/share/nginx/error_pages;
            try_files /401.html =401;
            internal;
        }

        # Handle 403 Forbidden errors
        location @error403 {
            if ($http_accept ~ "application/json") {
                add_header Content-Type "application/json" always;
                return 403 '{"error": "Access forbidden", "message": "You do not have permission to access this resource"}';
            }
            root /usr/share/nginx/error_pages;
            try_files /403.html =403;
            internal;
        }

        # Handle 404 Not Found errors
        location @error404 {
            root /usr/share/nginx/error_pages;
            try_files /404.html =404;
            internal;
        }

        # Handle 500 Internal Server errors
        location @error500 {
            root /usr/share/nginx/error_pages;
            try_files /500.html =500;
            internal;
        }

        # Handle 502/503/504 Gateway errors
        location @error502 {
            root /usr/share/nginx/error_pages;
            try_files /502.html =502;
            internal;
        }

        # Custom error pages
        error_page 401 = @error401;
        error_page 403 = @error403;
        error_page 404 = @error404;
        error_page 500 = @error500;
        error_page 502 503 504 = @error502;
        
        
        # Orthanc logo for error pages
        location = /orthanc-logo.png {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            root /usr/share/nginx/logo;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Catch-all for undefined routes
        location / {
            include /etc/nginx/conf.d/auth_request.conf;
            return 401;
        }
    }
}