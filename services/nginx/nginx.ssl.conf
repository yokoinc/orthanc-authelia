# =============================================================================
# NGINX CONFIGURATION WITH SSL TERMINATION FOR ORTHANC-AUTHELIA
# =============================================================================
# This configuration handles SSL/TLS termination directly on nginx
# Use this for self-hosted SSL instead of Cloudflare tunnel
# Uses standard nginx (no Lua/OpenResty required)
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 2g;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript 
               application/xml+rss application/rss+xml 
               application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Include additional configurations
    include /etc/nginx/conf.d/*.conf;
    
    # =============================================================================
    # UPSTREAM SERVERS CONFIGURATION
    # =============================================================================
    upstream orthanc {
        server orthanc:8042;
    }

    upstream authelia {
        server authelia:9091;
    }

    upstream auth_service {
        server auth-service:8000;
    }

    # =============================================================================
    # AUTHENTICATION TOKEN MAPPING
    # =============================================================================
    map $groups $auth_token {
        ~admin    "admin-token";
        ~doctor   "doctor-token";
        ~external "external-token";
        default   "";
    }

    # =============================================================================
    # HTTP TO HTTPS REDIRECT
    # =============================================================================
    server {
        listen 80;
        server_name _;
        
        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================================================
    # MAIN HTTPS SERVER
    # =============================================================================
    server {
        listen 443 ssl;
        server_name _;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Buffer configuration
        large_client_header_buffers 8 16k;
        
        # Security headers (centralized configuration)
        include /etc/nginx/conf.d/security_headers.conf;
        etag off;

        # =============================================================================
        # ROOT REDIRECTION
        # =============================================================================
        location = / {
            return 302 /auth/;
        }

        # =============================================================================
        # STATIC ASSETS (NO AUTHENTICATION)
        # =============================================================================
        
        # Authelia static assets (handle both /static and /static/ with regex)
        location ~ ^/static/?(.*)$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://authelia/static/$1;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/remove_csp.conf;
            
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        
        # Use Orthanc Explorer 2 favicon for any app path requests (must be before /app/)
        location ~ ^/app/.*favicon\.ico$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            rewrite ^/app/.*favicon\.ico$ /ui/app/favicon.ico break;
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # OHIF assets accessed from app path (for token access)
        location /app/ {
            proxy_pass http://ohif:8080/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/cors_ohif.conf;
        }
        
        # Authelia locales (no auth required) - exact match without trailing slash
        location = /locales {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://authelia/locales;
            include /etc/nginx/conf.d/proxy_headers.conf;
            expires 1h;
            add_header Cache-Control "public";
        }
        
        # Authelia locale files (individual translation files)
        location ~ ^/locales/[^/]+/[^/]+\.json$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://authelia$request_uri;
            include /etc/nginx/conf.d/proxy_headers.conf;
            expires 1h;
            add_header Cache-Control "public";
        }

        # General static assets (Orthanc, Stone, VolView) - processed after specific routes
        location ~* \.(js|css|png|jpe?g|gif|svg|ico|webp|json|gz|wasm|woff|woff2|ttf|eot|map)$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # =============================================================================
        # AUTHENTICATED APPLICATION ROUTES
        # =============================================================================
        
        # Shared studies access (public with token validation and redirect to OHIF)
        location /share/ {
            proxy_pass http://auth_service/share/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/security_headers.conf;
        }
        
        # API calls from share interface
        location /share/api/ {
            proxy_pass http://orthanc/api/;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }
        
        # DICOM resources from share interface
        location ~ ^/share/(studies|series|instances|patients|tools|system|statistics|modalities|peers|plugins|jobs|changes|exports|preview)(?:/|$) {
            rewrite ^/share/(.*)$ /$1 break;
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/cors_headers.conf;
        }
        
        # Orthanc web interface
        location /ui/ {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }
        
        # Stone WebViewer (high-performance WebAssembly viewer)
        location /stone-webviewer/ {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }
        
        # VolView WebViewer (3D volumetric visualization)
        location /volview/ {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }
        
        # OHIF viewer assets (JavaScript, CSS, images) - MOVED HERE FOR PRIORITY
        location ~* ^/ohif/.*\.(js|css|png|jpe?g|gif|svg|ico|webp|json|gz|wasm|woff|woff2|ttf|eot|map)$ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            rewrite ^/ohif/(.*)$ /$1 break;
            proxy_pass http://ohif:8080;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/cors_ohif.conf;
        }
        
        # OHIF Viewer (protected by Authelia)
        location /ohif/ {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://ohif:8080/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
            include /etc/nginx/conf.d/cors_ohif.conf;
        }

        # =============================================================================
        # DICOM API ENDPOINTS (AUTHENTICATED)
        # =============================================================================
        
        # WADO (Web Access to DICOM Objects) - for OHIF image retrieval
        location /wado {
            include /etc/nginx/conf.d/auth_request.conf;
            include /etc/nginx/conf.d/extract_token.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # DICOM-Web API (DICOMweb standard endpoints)
        location /dicom-web {
            include /etc/nginx/conf.d/auth_request.conf;
            include /etc/nginx/conf.d/extract_token.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }
        
        # Orthanc REST API (instances, patients, series, studies, etc.)
        location ~ ^/(instances|patients|series|studies|tools|system|statistics|modalities|peers|plugins|jobs|changes|exports|preview|shares|shared|publish)(?:/|$) {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
            include /etc/nginx/conf.d/cors_headers.conf;
        }

        # =============================================================================
        # AUTHELIA AUTHENTICATION ENDPOINTS
        # =============================================================================
        
        # Token management interface (must be before /auth/tokens/)
        location /auth/tokens/manage {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://auth_service/tokens/manage;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # Token statistics endpoint (must be before /auth/tokens/)
        location /auth/tokens/stats {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://auth_service/tokens/stats;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # Expired tokens endpoint (must be before /auth/tokens/)
        location /auth/tokens/expired {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://auth_service/tokens/expired;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # Authorization plugin token endpoints - high priority
        location ^~ /auth/tokens {
            include /etc/nginx/conf.d/auth_request.conf;
            
            proxy_pass http://auth_service/tokens;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/auth_headers.conf;
        }

        # Auth service static files (must be before /auth/)
        location ^~ /auth/static/ {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            proxy_pass http://auth_service/static/;
        }

        # Redirect /auth to /auth/ for consistency
        location = /auth {
            return 302 /auth/;
        }

        # Authelia authentication interface
        location /auth/ {
            proxy_pass http://authelia/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            include /etc/nginx/conf.d/remove_csp.conf;
            include /etc/nginx/conf.d/security_headers_authelia.conf;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host pacs.yokoinc.ovh;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Authelia API endpoints
        location /api/ {
            proxy_pass http://authelia/api/;
            include /etc/nginx/conf.d/proxy_headers.conf;
            proxy_set_header Cookie $http_cookie;
        }

        # Internal authentication verification endpoint
        location /authelia/ {
            internal;
            proxy_pass http://authelia/api/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URL https://pacs.yokoinc.ovh$request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header Cookie $http_cookie;
        }

        # =============================================================================
        # ADDITIONAL SERVICES
        # =============================================================================
        
        # Authelia manifest.json for PWA support
        location = /manifest.json {
            proxy_pass http://authelia/manifest.json;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }

        # Authelia authenticated endpoint
        location /authenticated {
            proxy_pass http://authelia/authenticated;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }

        # Root favicon redirects to Orthanc UI
        location = /favicon.ico {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            
            rewrite ^/favicon\.ico$ /ui/app/favicon.ico break;
            proxy_pass http://orthanc;
            include /etc/nginx/conf.d/proxy_headers.conf;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        
        # Common web assets (manifest)
        location ~ ^/(manifest\.json)$ {
            proxy_pass http://authelia$request_uri;
            include /etc/nginx/conf.d/proxy_headers.conf;
        }

        # =============================================================================
        # ERROR HANDLING
        # =============================================================================
        
        # Handle 401 Unauthorized errors
        location @error401 {
            if ($http_accept ~ "application/json") {
                add_header Content-Type "application/json" always;
                return 401 '{"error": "Authentication required", "message": "Please login to access this resource"}';
            }
            add_header Content-Type "text/html; charset=UTF-8" always;
            return 401 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Accès non autorisé - ORTHANC-AUTHELIA</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"><style>body{font-family:Avenir,Helvetica,Arial,sans-serif;background:#1e242a;color:#ffffff;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;height:100vh;display:flex;flex-direction:column}.logo-header{text-align:center;padding:20px 0}.logo{width:120px;height:auto}.content{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 50px;transform:translateY(-20%)}.error-code{font-size:4em;color:#ffffff;margin-bottom:15px}h1{color:#6ea0c8;margin-bottom:15px;font-size:1.5em}p{color:#ffffff;margin-bottom:20px;font-size:1em}a{color:#ffffff;text-decoration:none;padding:8px 16px;border:2px solid #ffffff;border-radius:5px;display:inline-block;margin:8px;transition:all 0.3s ease;font-size:0.9em}a:hover{background:#ffffff;color:#1e242a}.icon{font-size:1em;margin-right:6px}.container{max-width:600px;margin:0 auto}</style></head><body><div class="logo-header"><img src="/orthanc-logo.png" alt="Orthanc Logo" class="logo"></div><div class="content"><div class="container"><div class="error-code">401</div><h1><i class="fas fa-lock icon"></i>Accès non autorisé</h1><p>Vous devez être connecté pour accéder à cette ressource.</p><p>Veuillez vous authentifier pour continuer.</p><a href="/auth/"><i class="fas fa-sign-in-alt icon"></i>Se connecter</a></div></div></body></html>';
        }

        # Handle 403 Forbidden errors
        location @error403 {
            if ($http_accept ~ "application/json") {
                add_header Content-Type "application/json" always;
                return 403 '{"error": "Access forbidden", "message": "You do not have permission to access this resource"}';
            }
            add_header Content-Type "text/html; charset=UTF-8" always;
            return 403 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Accès interdit - ORTHANC-AUTHELIA</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"><style>body{font-family:Avenir,Helvetica,Arial,sans-serif;background:#1e242a;color:#ffffff;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;height:100vh;display:flex;flex-direction:column}.logo-header{text-align:center;padding:20px 0}.logo{width:120px;height:auto}.content{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 50px;transform:translateY(-20%)}.error-code{font-size:4em;color:#ffffff;margin-bottom:15px}h1{color:#6ea0c8;margin-bottom:15px;font-size:1.5em}p{color:#ffffff;margin-bottom:20px;font-size:1em}a{color:#ffffff;text-decoration:none;padding:8px 16px;border:2px solid #ffffff;border-radius:5px;display:inline-block;margin:8px;transition:all 0.3s ease;font-size:0.9em}a:hover{background:#ffffff;color:#1e242a}.icon{font-size:1em;margin-right:6px}.container{max-width:600px;margin:0 auto}</style></head><body><div class="logo-header"><img src="/orthanc-logo.png" alt="Orthanc Logo" class="logo"></div><div class="content"><div class="container"><div class="error-code">403</div><h1><i class="fas fa-ban icon"></i>Accès interdit</h1><p>Vous n'\''avez pas l'\''autorisation d'\''accéder à cette ressource.</p><p>Veuillez contacter l'\''administrateur si nécessaire.</p><a href="/auth/"><i class="fas fa-sign-in-alt icon"></i>Se connecter</a></div></div></body></html>';
        }

        # Handle 404 Not Found errors
        location @error404 {
            add_header Content-Type "text/html; charset=UTF-8" always;
            return 404 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Page non trouvée - ORTHANC-AUTHELIA</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"><style>body{font-family:Avenir,Helvetica,Arial,sans-serif;background:#1e242a;color:#ffffff;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;height:100vh;display:flex;flex-direction:column}.logo-header{text-align:center;padding:20px 0}.logo{width:120px;height:auto}.content{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 50px;transform:translateY(-20%)}.error-code{font-size:4em;color:#ffffff;margin-bottom:15px}h1{color:#6ea0c8;margin-bottom:15px;font-size:1.5em}p{color:#ffffff;margin-bottom:20px;font-size:1em}a{color:#ffffff;text-decoration:none;padding:8px 16px;border:2px solid #ffffff;border-radius:5px;display:inline-block;margin:8px;transition:all 0.3s ease;font-size:0.9em}a:hover{background:#ffffff;color:#1e242a}.icon{font-size:1em;margin-right:6px}.container{max-width:600px;margin:0 auto}</style></head><body><div class="logo-header"><img src="/orthanc-logo.png" alt="Orthanc Logo" class="logo"></div><div class="content"><div class="container"><div class="error-code">404</div><h1><i class="fas fa-question-circle icon"></i>Page non trouvée</h1><p>La page que vous recherchez n'\''existe pas.</p><p>Vérifiez l'\''URL ou retournez à l'\''accueil.</p><a href="/"><i class="fas fa-home icon"></i>Accueil</a></div></div></body></html>';
        }

        # Handle 500 Internal Server errors
        location @error500 {
            add_header Content-Type "text/html; charset=UTF-8" always;
            return 500 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Erreur serveur - ORTHANC-AUTHELIA</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"><style>body{font-family:Avenir,Helvetica,Arial,sans-serif;background:#1e242a;color:#ffffff;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;height:100vh;display:flex;flex-direction:column}.logo-header{text-align:center;padding:20px 0}.logo{width:120px;height:auto}.content{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 50px;transform:translateY(-20%)}.error-code{font-size:4em;color:#ffffff;margin-bottom:15px}h1{color:#6ea0c8;margin-bottom:15px;font-size:1.5em}p{color:#ffffff;margin-bottom:20px;font-size:1em}a{color:#ffffff;text-decoration:none;padding:8px 16px;border:2px solid #ffffff;border-radius:5px;display:inline-block;margin:8px;transition:all 0.3s ease;font-size:0.9em}a:hover{background:#ffffff;color:#1e242a}.icon{font-size:1em;margin-right:6px}.container{max-width:600px;margin:0 auto}</style></head><body><div class="logo-header"><img src="/orthanc-logo.png" alt="Orthanc Logo" class="logo"></div><div class="content"><div class="container"><div class="error-code">500</div><h1><i class="fas fa-exclamation-triangle icon"></i>Erreur serveur</h1><p>Une erreur interne s'\''est produite.</p><p>Veuillez réessayer plus tard.</p><a href="/"><i class="fas fa-home icon"></i>Accueil</a></div></div></body></html>';
        }

        # Handle 502/503/504 Gateway errors
        location @error502 {
            add_header Content-Type "text/html; charset=UTF-8" always;
            return 502 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Service indisponible - ORTHANC-AUTHELIA</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"><style>body{font-family:Avenir,Helvetica,Arial,sans-serif;background:#1e242a;color:#ffffff;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;height:100vh;display:flex;flex-direction:column}.logo-header{text-align:center;padding:20px 0}.logo{width:120px;height:auto}.content{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 50px;transform:translateY(-20%)}.error-code{font-size:4em;color:#ffffff;margin-bottom:15px}h1{color:#6ea0c8;margin-bottom:15px;font-size:1.5em}p{color:#ffffff;margin-bottom:20px;font-size:1em}a{color:#ffffff;text-decoration:none;padding:8px 16px;border:2px solid #ffffff;border-radius:5px;display:inline-block;margin:8px;transition:all 0.3s ease;font-size:0.9em}a:hover{background:#ffffff;color:#1e242a}.icon{font-size:1em;margin-right:6px}.container{max-width:600px;margin:0 auto}</style></head><body><div class="logo-header"><img src="/orthanc-logo.png" alt="Orthanc Logo" class="logo"></div><div class="content"><div class="container"><div class="error-code">502</div><h1><i class="fas fa-server icon"></i>Service indisponible</h1><p>Le service est temporairement indisponible.</p><p>Veuillez réessayer dans quelques instants.</p><a href="/"><i class="fas fa-home icon"></i>Accueil</a></div></div></body></html>';
        }

        # Custom error pages
        error_page 404 = @error404;
        error_page 500 = @error500;
        error_page 502 503 504 = @error502;
        
        # Serve custom error pages
        location /errors/ {
            internal;
            root /usr/share/nginx/html;
        }
        
        # Orthanc logo for error pages
        location = /orthanc-logo.png {
            satisfy any;                    # Allow access without authentication
            allow all;                      # Allow all IPs
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Catch-all for undefined routes (protected by Authelia)
        location / {
            include /etc/nginx/conf.d/auth_request.conf;
            return 401;
        }
    }
}